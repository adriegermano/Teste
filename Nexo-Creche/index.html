<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Creche</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../CSS/CSS - LOGIN/login.css">

    <!-- Ícone -->
    <link rel="shortcut icon" href="../../IMG/logo-nexo-icon.png" type="image/x-icon">
</head>

<body class="pagina-login">

    <main class="login-page">

        <!-- Lado esquerdo -->
        <section class="left-panel">
            <div class="brand-title">
                <span class="nexo">Nexo</span>
                <span class="creche">Creche</span>
            </div>

            <img src="../../IMG/logo-fundo.png" alt="Logo Nexo Creche" class="logo-fundo">
        </section>

        <!-- Lado direito -->
        <section class="right-panel">

            <div class="login-box">

                <h2>Bem vindo(a)!</h2>
                <p>Acesse sua conta para continuar</p>

                <form onsubmit="redirecionar(event)">

                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
                    </div>

                    <div class="mb-1">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" id="senha" class="form-control" placeholder="********" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Esqueceu a senha?</a>
                    </div>

                    <div class="captcha-box">
                        <div class="captcha-left">
                            <input type="checkbox" id="captcha">
                            <span>Confirme que é humano</span>
                        </div>

                        <div class="captcha-right">
                            <img src="../../IMG/cloudflare.png" alt="Cloudflare" class="cf-logo-img">
                            <small>Privacy • Terms</small>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        Entrar
                    </button>

                </form>

            </div>

        </section>

    </main>

    <script src="../../JS/login.js"></script>

</body>

</html>
