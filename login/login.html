<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo - Creche</title>
    <link rel="stylesheet" href="login.css">
    <link rel="shortcut icon" href="/img/logo-nexo-icon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <div class="login">
            <h3>Bem-vindo(a) de volta!</h3>
            <p style="color: #49484a; margin-top: 0.5vw;">Acesse sua conta para continuar</p>
            <form action="/minhasturmas/minhasturmas.html">
                <p>
                    <label for="email">
                        Email:
                        <br>
                        <input type="email" placeholder="seu@email.com" required>
                    </label>
                </p>
                <p>
                    <label for="senha">
                        Senha:
                        <br>
                        <input type="password" placeholder="********" required>
                    </label>
                </p>
                <p style="color: #5513D8; font-size: 0.9vw;"><a href="">Esqueceu sua senha?</a></p>
                <br>

                    <button type="submit">
                        <strong>Entrar</strong>
                    </button>
            </form>


        </div>

        <div class="fundo">
            <div class="titulo-nexo">
                <h1 style="color: #F5F5F5; margin-right: 1.5vw;">Nexo</h1>
                <h1 style="color: #5513D8;">Creche</h1>
            </div>
            <img src="logo-fundo.png" alt="Logo de Fundo da Nexo">
        </div>
    </main>
</body>

</html>
